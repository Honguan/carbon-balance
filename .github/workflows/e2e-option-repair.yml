name: Temporary factor option E2E repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  factor-option-e2e-repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - name: Select published factor by stable option value
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/E2E/auth-flow.mjs')
          text = path.read_text()
          old = '    await publishedFactorSelect.selectOption({ label: `${factorName} / kgCO2e／kg / e2e-dataset-v1` });\n'
          new = '    const publishedFactorValue = await publishedFactorSelect.locator("option").filter({ hasText: factorName }).getAttribute("value");\n    assert(publishedFactorValue, "Published factor option did not expose a stable value.");\n    await publishedFactorSelect.selectOption(publishedFactorValue);\n'
          if old not in text:
              raise SystemExit('Published factor label selection was not found.')
          path.write_text(text.replace(old, new, 1))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/E2E/auth-flow.mjs
          git diff --cached --check
          git commit -m 'test: select factor by stable option value'
          git push origin HEAD:${{ github.head_ref }}
