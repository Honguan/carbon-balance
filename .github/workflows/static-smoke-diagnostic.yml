name: Static smoke diagnostic

on:
  pull_request:
  push:
    branches:
      - agent/auth-flow-functional-e2e

permissions:
  contents: read

jobs:
  diagnose-static-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Build release image
        run: docker build --tag carbon-static-diagnostic:${{ github.sha }} --file src/CarbonFootprint.Web/Dockerfile .
      - name: Capture responses and assets
        shell: bash
        run: |
          set -u
          mkdir -p static-smoke-diagnostic
          trap 'docker logs carbon-static-diagnostic > static-smoke-diagnostic/container.log 2>&1 || true; docker rm --force carbon-static-diagnostic >/dev/null 2>&1 || true' EXIT

          docker run --detach \
            --name carbon-static-diagnostic \
            --publish 18088:8080 \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env 'ConnectionStrings__Database=Host=127.0.0.1;Port=5432;Database=carbon_smoke;Username=smoke;Password=smoke-password-123;SSL Mode=Disable;GSS Encryption Mode=Disable' \
            carbon-static-diagnostic:${{ github.sha }}

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18088/health/live >/dev/null; then
              break
            fi
            sleep 2
          done

          for item in \
            'login|/Identity/Account/Login' \
            'resend|/Identity/Account/ResendEmailConfirmation' \
            'confirm|/Identity/Account/ConfirmEmail' \
            'home|/' \
            'bootstrap|/lib/bootstrap/dist/css/bootstrap.min.css' \
            'site|/css/site.css' \
            'auth-fixes|/css/auth-fixes.css' \
            'site-js|/js/site.js' \
            'forgot|/Identity/Account/ForgotPassword' \
            'mfa|/Identity/Account/LoginWith2fa'; do
            name="${item%%|*}"
            route="${item#*|}"
            curl --silent --show-error \
              --dump-header "static-smoke-diagnostic/${name}.headers" \
              --output "static-smoke-diagnostic/${name}.body" \
              --write-out '%{http_code}\n' \
              "http://127.0.0.1:18088${route}" \
              > "static-smoke-diagnostic/${name}.status" || true
          done

          grep -nE 'href=|登入碳足跡|建立帳號|重寄確認信|確認連結|返回上一頁' \
            static-smoke-diagnostic/login.body \
            static-smoke-diagnostic/resend.body \
            static-smoke-diagnostic/confirm.body \
            > static-smoke-diagnostic/markers.txt || true

          for file in static-smoke-diagnostic/*.status; do
            printf '%s: %s' "$(basename "$file")" "$(cat "$file")"
          done | tee static-smoke-diagnostic/status-summary.txt
      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: static-smoke-diagnostic
          path: static-smoke-diagnostic
          if-no-files-found: error
