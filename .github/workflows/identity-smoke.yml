name: Identity layout smoke

on:
  pull_request:
    paths:
      - 'src/CarbonFootprint.Web/**'
      - '.github/workflows/identity-smoke.yml'

permissions:
  contents: read

jobs:
  identity-layout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Build release image
        run: docker build --quiet --tag carbon-identity-smoke:${{ github.sha }} --file src/CarbonFootprint.Web/Dockerfile .

      - name: Capture rendered page and assets
        run: |
          set -u
          mkdir -p identity-smoke

          docker run --detach \
            --name carbon-identity-smoke \
            --publish 18089:8080 \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env 'ConnectionStrings__Database=Host=127.0.0.1;Port=5432;Database=carbon_smoke;Username=smoke;Password=smoke-password-123;SSL Mode=Disable;GSS Encryption Mode=Disable' \
            carbon-identity-smoke:${{ github.sha }} \
            > identity-smoke/container-id.txt

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18089/health/live >/dev/null; then
              break
            fi
            sleep 2
          done

          curl --silent --show-error \
            --dump-header identity-smoke/login-headers.txt \
            --output identity-smoke/login.html \
            --write-out '%{http_code}\n' \
            http://127.0.0.1:18089/Identity/Account/Login \
            > identity-smoke/login-status.txt || true

          curl --silent --show-error \
            --dump-header identity-smoke/bootstrap-headers.txt \
            --output identity-smoke/bootstrap.css \
            --write-out '%{http_code}\n' \
            http://127.0.0.1:18089/lib/bootstrap/dist/css/bootstrap.min.css \
            > identity-smoke/bootstrap-status.txt || true

          curl --silent --show-error \
            --dump-header identity-smoke/site-headers.txt \
            --output identity-smoke/site.css \
            --write-out '%{http_code}\n' \
            http://127.0.0.1:18089/css/site.css \
            > identity-smoke/site-status.txt || true

          docker logs carbon-identity-smoke \
            > identity-smoke/container.log 2>&1 || true
          docker rm --force carbon-identity-smoke >/dev/null 2>&1 || true

          {
            echo "login_status=$(cat identity-smoke/login-status.txt 2>/dev/null || true)"
            echo "bootstrap_status=$(cat identity-smoke/bootstrap-status.txt 2>/dev/null || true)"
            echo "site_status=$(cat identity-smoke/site-status.txt 2>/dev/null || true)"
            echo "has_zh_layout=$(grep -c '<html lang=\"zh-Hant-TW\">' identity-smoke/login.html 2>/dev/null || true)"
            echo "has_app_title=$(grep -c '產品碳足跡系統' identity-smoke/login.html 2>/dev/null || true)"
            echo "has_default_identity_layout=$(grep -c 'CarbonFootprint.Web' identity-smoke/login.html 2>/dev/null || true)"
            echo "bootstrap_bytes=$(wc -c < identity-smoke/bootstrap.css 2>/dev/null || echo 0)"
            echo "site_bytes=$(wc -c < identity-smoke/site.css 2>/dev/null || echo 0)"
          } | tee identity-smoke/summary.txt

          if grep -qx '200' identity-smoke/login-status.txt \
             && grep -qx '200' identity-smoke/bootstrap-status.txt \
             && grep -qx '200' identity-smoke/site-status.txt \
             && grep -q '<html lang="zh-Hant-TW">' identity-smoke/login.html \
             && grep -q '產品碳足跡系統' identity-smoke/login.html \
             && test -s identity-smoke/bootstrap.css \
             && test -s identity-smoke/site.css; then
            touch identity-smoke/success
          fi

      - name: Upload Identity diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: identity-smoke
          path: identity-smoke
          if-no-files-found: error

      - name: Require styled Identity page
        run: test -f identity-smoke/success
