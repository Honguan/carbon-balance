name: Temporary build diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
      - name: Restore locked packages
        run: dotnet restore --locked-mode
      - name: Capture build diagnostics
        shell: bash
        run: |
          set +e
          dotnet build --configuration Release --no-restore --nologo --verbosity:minimal > build.log 2>&1
          status=$?
          grep -E '(: error |error (CS|RZ|NU|MSB)[0-9]+)' build.log > build-errors.txt || true
          tail -n 120 build.log > build-tail.txt
          printf '%s\n' "$status" > build-status.txt
          cat build-errors.txt
          exit 0
      - name: Upload build diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: build-diagnostic
          path: |
            build-errors.txt
            build-tail.txt
            build-status.txt
          if-no-files-found: error
