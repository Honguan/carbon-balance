name: Temporary workspace build repair

on:
  pull_request:

permissions:
  contents: write

jobs:
  workspace-build-repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - name: Restore missing factor lookup and commit
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/CarbonFootprint.Web/Pages/Workspace.cshtml')
          text = path.read_text()
          anchor = '    var latestSelectedRun = Model.Runs.FirstOrDefault(item => item.ProjectVersionId == Model.ProjectVersionId);\n'
          insertion = anchor + '    var factorsById = Model.Factors.ToDictionary(item => item.Id);\n'
          if 'var factorsById = Model.Factors.ToDictionary(item => item.Id);' not in text:
              if anchor not in text:
                  raise SystemExit('Workspace factor lookup insertion point was not found.')
              text = text.replace(anchor, insertion, 1)
              path.write_text(text)
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/CarbonFootprint.Web/Pages/Workspace.cshtml
          if git diff --cached --quiet; then
            echo 'Workspace factor lookup already exists.'
            exit 0
          fi
          git diff --cached --check
          git commit -m 'fix: restore workspace factor lookup'
          git push origin HEAD:${{ github.head_ref }}
