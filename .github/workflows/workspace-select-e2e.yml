name: Workspace select browser E2E

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workspace-select-browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: carbon_workspace_e2e
          POSTGRES_USER: carbon_workspace
          POSTGRES_PASSWORD: workspace-e2e-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbon_workspace -d carbon_workspace_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mailpit:
        image: axllent/mailpit:v1.30
        ports:
          - 1025:1025
          - 8025:8025
    env:
      E2E_DATABASE: Host=127.0.0.1;Port=5432;Database=carbon_workspace_e2e;Username=carbon_workspace;Password=workspace-e2e-postgres-password;SSL Mode=Disable;GSS Encryption Mode=Disable
      E2E_PG_URL: postgresql://carbon_workspace:workspace-e2e-postgres-password@127.0.0.1:5432/carbon_workspace_e2e
    steps:
      - uses: actions/checkout@v7
      - name: Build workspace browser-test image
        run: docker build --tag carbon-workspace-e2e:${{ github.sha }} --file src/CarbonFootprint.Web/Dockerfile .
      - name: Apply migrations
        run: |
          docker run --rm --network host \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env "ConnectionStrings__Database=${E2E_DATABASE}" \
            carbon-workspace-e2e:${{ github.sha }} --migrate
      - name: Start web application
        run: |
          docker run --detach \
            --name carbon-workspace-e2e-app \
            --network host \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env ASPNETCORE_URLS=http://0.0.0.0:18088 \
            --env "ConnectionStrings__Database=${E2E_DATABASE}" \
            --env MAIL__HOST=127.0.0.1 \
            --env MAIL__PORT=1025 \
            --env DataProtection__KeyPath=/tmp/data-protection-keys \
            carbon-workspace-e2e:${{ github.sha }}

          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:18088/health/ready >/dev/null; then
              exit 0
            fi
            if [ "$attempt" -eq 40 ]; then
              docker logs carbon-workspace-e2e-app
              exit 1
            fi
            sleep 2
          done
      - name: Run Chromium workspace select flow
        run: |
          rm -rf tests/E2E/artifacts
          mkdir -p tests/E2E/artifacts
          docker run --rm \
            --network host \
            --volume "$PWD/tests/E2E:/work" \
            --workdir /work \
            --env CARBON_E2E_BASE_URL=http://127.0.0.1:18088 \
            --env CARBON_E2E_MAILPIT_URL=http://127.0.0.1:8025 \
            --env CARBON_E2E_ARTIFACTS=/work/artifacts \
            --env "CARBON_E2E_PG_URL=${E2E_PG_URL}" \
            mcr.microsoft.com/playwright:v1.55.0-noble \
            bash -lc 'npm install --no-save --no-package-lock playwright@1.55.0 pg@8.13.1 >/tmp/playwright-npm.log && node auth-flow.mjs'
      - name: Show application logs
        if: always()
        run: docker logs carbon-workspace-e2e-app || true
      - name: Upload workspace browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workspace-select-browser-e2e
          path: tests/E2E/artifacts
          if-no-files-found: warn
      - name: Stop workspace browser-test application
        if: always()
        run: docker rm --force carbon-workspace-e2e-app >/dev/null 2>&1 || true
