name: Pull request validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-workspace-e2e:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - name: Fix PCR empty-select locator and commit
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/E2E/auth-flow.mjs')
          text = path.read_text()
          old = '    assert(await page.locator("#pcrVersionId").isDisabled(), "PCR select should be disabled without a published PCR.");\n    assert((await emptyPcrSelect.locator("option").first().textContent()).includes("尚無已發布 PCR 版本"), "Empty PCR select did not explain its prerequisite.");\n'
          new = '    const emptyPcrSelect = page.locator("#pcrVersionId");\n    assert(await emptyPcrSelect.isDisabled(), "PCR select should be disabled without a published PCR.");\n    assert((await emptyPcrSelect.locator("option").first().textContent()).includes("尚無已發布 PCR 版本"), "Empty PCR select did not explain its prerequisite.");\n'
          if old not in text:
              raise SystemExit('PCR empty-select test block was not found.')
          path.write_text(text.replace(old, new, 1))
          PY
          node --check tests/E2E/auth-flow.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/E2E/auth-flow.mjs
          git diff --cached --check
          git commit -m 'test: fix PCR empty select browser assertion'
          git push origin HEAD:${{ github.head_ref }}
