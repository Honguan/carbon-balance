name: Pull request validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: carbon_footprint_ci
          POSTGRES_USER: carbon_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbon_ci -d carbon_footprint_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ConnectionStrings__Database: Host=127.0.0.1;Port=5432;Database=carbon_footprint_ci;Username=carbon_ci;Password=ci-only-password;SSL Mode=Disable;GSS Encryption Mode=Disable
      CARBON_TEST_DB_CONNECTION: Host=127.0.0.1;Port=5432;Database=carbon_footprint_ci;Username=carbon_ci;Password=ci-only-password;SSL Mode=Disable;GSS Encryption Mode=Disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore tools and locked packages
        run: |
          dotnet tool restore
          dotnet restore --locked-mode
      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore
      - name: Build Release
        run: dotnet build --configuration Release --no-restore
      - name: Apply migrations to empty PostgreSQL
        run: dotnet run --project src/CarbonFootprint.Web --configuration Release --no-build -- --migrate
      - name: Run unit and Golden Case tests
        run: |
          dotnet test tests/Unit --configuration Release --no-build
          dotnet test tests/GoldenCases --configuration Release --no-build
      - name: Run integration tests
        run: dotnet test tests/Integration --configuration Release --no-build
      - name: Run architecture and contract tests
        run: |
          dotnet test tests/Architecture --configuration Release --no-build
          dotnet test tests/Contract --configuration Release --no-build
      - name: Run security tests
        run: dotnet test tests/Security --configuration Release --no-build
      - name: Collect coverage
        run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults
      - name: NuGet vulnerability audit
        run: dotnet restore --locked-mode -p:NuGetAudit=true -p:NuGetAuditMode=all -p:TreatWarningsAsErrors=true
      - name: Validate Bash setup script
        run: bash -n scripts/setup-local.sh
      - name: Validate Windows PowerShell 5.1 encoding safety
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/setup-local.ps1')
          data = path.read_bytes()
          non_ascii = [(index + 1, value) for index, value in enumerate(data) if value > 0x7F]
          if non_ascii:
              first_offset, first_value = non_ascii[0]
              raise SystemExit(
                  f'{path} must remain ASCII-only for Windows PowerShell 5.1; '
                  f'first non-ASCII byte is 0x{first_value:02X} at offset {first_offset}.'
              )
          PY
      - name: Validate PowerShell setup script
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path 'scripts/setup-local.ps1'),
            [ref]$tokens,
            [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Validate Compose
        env:
          POSTGRES_PASSWORD: ci-compose-postgres-password
          MINIO_ROOT_PASSWORD: ci-compose-minio-password
        run: docker compose config --quiet
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults
          if-no-files-found: warn

  windows-powershell-setup:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Exercise clean setup with Windows PowerShell 5.1
        shell: powershell
        run: |
          $mockDirectory = Join-Path $env:RUNNER_TEMP 'carbon-docker-mock'
          New-Item -ItemType Directory -Path $mockDirectory -Force | Out-Null
          @'
          @echo off
          if "%1"=="info" exit /b 0
          if "%1"=="compose" exit /b 0
          if "%1"=="volume" if "%2"=="ls" exit /b 0
          exit /b 1
          '@ | Set-Content -LiteralPath (Join-Path $mockDirectory 'docker.cmd') -Encoding Ascii

          $env:PATH = "$mockDirectory;$env:PATH"
          Remove-Item -LiteralPath '.env' -Force -ErrorAction SilentlyContinue
          .\scripts\setup-local.ps1 -NoStart

          if (-not (Test-Path -LiteralPath '.env')) {
            throw 'The setup script did not create .env in a clean environment.'
          }

          $postgresPassword = (Get-Content -LiteralPath '.env' |
            Where-Object { $_ -like 'POSTGRES_PASSWORD=*' } |
            Select-Object -Last 1) -replace '^POSTGRES_PASSWORD=', ''
          $minioPassword = (Get-Content -LiteralPath '.env' |
            Where-Object { $_ -like 'MINIO_ROOT_PASSWORD=*' } |
            Select-Object -Last 1) -replace '^MINIO_ROOT_PASSWORD=', ''

          if ([string]::IsNullOrWhiteSpace($postgresPassword) -or
              [string]::IsNullOrWhiteSpace($minioPassword)) {
            throw 'The setup script did not generate both required passwords.'
          }
          if ($postgresPassword -eq $minioPassword) {
            throw 'The generated PostgreSQL and MinIO passwords must be different.'
          }
          Remove-Item -LiteralPath '.env' -Force

  auth-browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: carbon_auth_e2e
          POSTGRES_USER: carbon_e2e
          POSTGRES_PASSWORD: auth-e2e-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbon_e2e -d carbon_auth_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mailpit:
        image: axllent/mailpit:v1.30
        ports:
          - 1025:1025
          - 8025:8025
    env:
      E2E_DATABASE: Host=127.0.0.1;Port=5432;Database=carbon_auth_e2e;Username=carbon_e2e;Password=auth-e2e-postgres-password;SSL Mode=Disable;GSS Encryption Mode=Disable
    steps:
      - uses: actions/checkout@v7
      - name: Build browser-test image
        run: docker build --tag carbon-footprint-auth-e2e:${{ github.sha }} --file src/CarbonFootprint.Web/Dockerfile .
      - name: Apply migrations
        run: |
          docker run --rm --network host \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env "ConnectionStrings__Database=${E2E_DATABASE}" \
            carbon-footprint-auth-e2e:${{ github.sha }} --migrate
      - name: Start web application
        run: |
          docker run --detach \
            --name carbon-auth-e2e \
            --network host \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env ASPNETCORE_URLS=http://0.0.0.0:18088 \
            --env "ConnectionStrings__Database=${E2E_DATABASE}" \
            --env MAIL__HOST=127.0.0.1 \
            --env MAIL__PORT=1025 \
            --env DataProtection__KeyPath=/tmp/data-protection-keys \
            carbon-footprint-auth-e2e:${{ github.sha }}

          for attempt in {1..40}; do
            if curl --fail --silent http://127.0.0.1:18088/health/ready >/dev/null; then
              exit 0
            fi
            if [ "$attempt" -eq 40 ]; then
              docker logs carbon-auth-e2e
              exit 1
            fi
            sleep 2
          done
      - name: Run Chromium authentication flow
        run: |
          mkdir -p tests/E2E/artifacts
          docker run --rm \
            --network host \
            --volume "$PWD/tests/E2E:/work" \
            --workdir /work \
            --env CARBON_E2E_BASE_URL=http://127.0.0.1:18088 \
            --env CARBON_E2E_MAILPIT_URL=http://127.0.0.1:8025 \
            --env CARBON_E2E_ARTIFACTS=/work/artifacts \
            mcr.microsoft.com/playwright:v1.55.0-noble \
            bash -lc 'npm install --no-save --no-package-lock playwright@1.55.0 >/tmp/playwright-npm.log && node auth-flow.mjs'
      - name: Show application logs
        if: always()
        run: docker logs carbon-auth-e2e || true
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: auth-browser-e2e
          path: tests/E2E/artifacts
          if-no-files-found: warn
      - name: Stop browser-test application
        if: always()
        run: docker rm --force carbon-auth-e2e >/dev/null 2>&1 || true

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-sbom-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Build release image
        run: docker build --quiet --tag carbon-footprint:${{ github.sha }} --file src/CarbonFootprint.Web/Dockerfile .
      - name: Verify login, email confirmation routes and rendered static assets
        run: |
          set -euo pipefail
          trap 'docker rm --force carbon-static-smoke >/dev/null 2>&1 || true' EXIT

          docker run --detach \
            --name carbon-static-smoke \
            --publish 18088:8080 \
            --env ASPNETCORE_ENVIRONMENT=Development \
            --env 'ConnectionStrings__Database=Host=127.0.0.1;Port=5432;Database=carbon_smoke;Username=smoke;Password=smoke-password-123;SSL Mode=Disable;GSS Encryption Mode=Disable' \
            carbon-footprint:${{ github.sha }}

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18088/health/live >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs carbon-static-smoke
              exit 1
            fi
            sleep 2
          done

          curl --fail --silent --show-error \
            --output /tmp/login.html \
            http://127.0.0.1:18088/Identity/Account/Login
          curl --fail --silent --show-error \
            --output /tmp/resend.html \
            http://127.0.0.1:18088/Identity/Account/ResendEmailConfirmation
          curl --fail --silent --show-error \
            --output /tmp/confirm.html \
            http://127.0.0.1:18088/Identity/Account/ConfirmEmail
          curl --fail --silent --show-error \
            --output /tmp/home.html \
            http://127.0.0.1:18088/

          grep --quiet '<html lang="zh-Hant-TW">' /tmp/login.html
          grep --quiet '碳衡產品碳足跡系統' /tmp/login.html
          grep --quiet '登入碳足跡系統' /tmp/login.html
          grep --quiet '在這台裝置保持登入 30 天' /tmp/login.html
          grep --quiet '建立帳號' /tmp/login.html
          grep --quiet '重寄確認信' /tmp/login.html
          grep --quiet '重寄確認信' /tmp/resend.html
          grep --quiet '返回上一頁' /tmp/resend.html
          grep --quiet '無法確認 Email' /tmp/confirm.html
          grep --quiet '確認連結不完整' /tmp/confirm.html
          grep --quiet '把產品碳排放' /tmp/home.html
          grep --quiet '廢棄與回收' /tmp/home.html

          ! grep --quiet 'Forgot your password' /tmp/login.html
          ! grep --quiet 'Use another service' /tmp/login.html
          ! grep --quiet 'Register as a new user' /tmp/login.html

          forgot_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18088/Identity/Account/ForgotPassword)"
          mfa_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18088/Identity/Account/LoginWith2fa)"
          confirm_status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18088/Identity/Account/ConfirmEmail)"
          test "$forgot_status" = '302'
          test "$mfa_status" = '302'
          test "$confirm_status" = '200'

          bootstrap_href="$(grep -oE 'href="/lib/bootstrap/dist/css/bootstrap\.min(\.[A-Za-z0-9]+)?\.css"' /tmp/login.html | head -n 1 | cut -d '"' -f 2)"
          site_href="$(grep -oE 'href="/css/site(\.[A-Za-z0-9]+)?\.css"' /tmp/login.html | head -n 1 | cut -d '"' -f 2)"
          auth_fixes_href="$(grep -oE 'href="/css/auth-fixes(\.[A-Za-z0-9]+)?\.css"' /tmp/login.html | head -n 1 | cut -d '"' -f 2)"

          test -n "$bootstrap_href"
          test -n "$site_href"
          test -n "$auth_fixes_href"

          curl --fail --silent --show-error \
            --output /tmp/bootstrap.css \
            "http://127.0.0.1:18088${bootstrap_href}"
          curl --fail --silent --show-error \
            --output /tmp/site.css \
            "http://127.0.0.1:18088${site_href}"
          curl --fail --silent --show-error \
            --output /tmp/auth-fixes.css \
            "http://127.0.0.1:18088${auth_fixes_href}"

          test -s /tmp/bootstrap.css
          test -s /tmp/site.css
          test -s /tmp/auth-fixes.css
          grep --quiet -- '--carbon-950' /tmp/site.css
          grep --quiet '.auth-shell' /tmp/site.css
          grep --quiet 'pointer-events: auto' /tmp/auth-fixes.css
      - name: Scan filesystem for Critical and High vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
      - name: Scan image for Critical and High vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: carbon-footprint:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: carbon-footprint:${{ github.sha }}
          format: cyclonedx-json
          output-file: carbon-footprint.sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: carbon-footprint.sbom.cdx.json
