name: Pull request validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: carbon_footprint_ci
          POSTGRES_USER: carbon_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbon_ci -d carbon_footprint_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ConnectionStrings__Database: Host=127.0.0.1;Port=5432;Database=carbon_footprint_ci;Username=carbon_ci;Password=ci-only-password;SSL Mode=Disable;GSS Encryption Mode=Disable
      CARBON_TEST_DB_CONNECTION: Host=127.0.0.1;Port=5432;Database=carbon_footprint_ci;Username=carbon_ci;Password=ci-only-password;SSL Mode=Disable;GSS Encryption Mode=Disable
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Restore tools and locked packages
        run: |
          dotnet tool restore
          dotnet restore --locked-mode
      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore
      - name: Build Release
        run: dotnet build --configuration Release --no-restore
      - name: Apply migrations to empty PostgreSQL
        run: dotnet run --project src/CarbonFootprint.Web --configuration Release --no-build -- --migrate
      - name: Run all tests
        run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          if-no-files-found: warn

