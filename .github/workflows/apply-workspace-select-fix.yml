name: Apply workspace select repair

on:
  push:
    branches:
      - agent/fix-workspace-selects-e2e

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/fix-workspace-selects-e2e
      - name: Apply verified patch
        shell: bash
        run: |
          printf '%s' '' | base64 --decode | gzip --decompress > /tmp/workspace-select-fix.patch
          git apply --check /tmp/workspace-select-fix.patch
          git apply /tmp/workspace-select-fix.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/pull-request.yml src/CarbonFootprint.Web/Pages/Workspace.cshtml src/CarbonFootprint.Web/Pages/Workspace.cshtml.cs src/CarbonFootprint.Web/wwwroot/css/site.css src/CarbonFootprint.Web/wwwroot/js/site.js tests/E2E/auth-flow.mjs
          git commit -m 'fix: make workspace selects usable and testable'
          git push origin HEAD:agent/fix-workspace-selects-e2e
