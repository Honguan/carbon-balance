name: Apply workspace select repair from PR

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - name: Extract and apply repair patch
        id: repair
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p repair-diagnostic
          {
            python - <<'PY'
          from pathlib import Path
          import re
          workflow = Path('.github/workflows/apply-workspace-select-fix.yml').read_text()
          match = re.search(r"printf '%s' '([A-Za-z0-9+/=]+)' \| base64", workflow)
          if not match:
              raise SystemExit('Embedded repair patch was not found.')
          Path('/tmp/workspace-select-fix.patch.gz.b64').write_text(match.group(1))
          print(f'embedded_base64_length={len(match.group(1))}')
          PY
            base64 --decode /tmp/workspace-select-fix.patch.gz.b64 | gzip --decompress > /tmp/workspace-select-fix.patch
            sha256sum /tmp/workspace-select-fix.patch
            git status --short --branch
            git apply --check /tmp/workspace-select-fix.patch
            git apply /tmp/workspace-select-fix.patch
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .github/workflows/pull-request.yml src/CarbonFootprint.Web/Pages/Workspace.cshtml src/CarbonFootprint.Web/Pages/Workspace.cshtml.cs src/CarbonFootprint.Web/wwwroot/css/site.css src/CarbonFootprint.Web/wwwroot/js/site.js tests/E2E/auth-flow.mjs
            git diff --cached --stat
            git commit -m 'fix: make workspace selects usable and testable'
            git push origin HEAD:${{ github.head_ref }}
          } > repair-diagnostic/repair.log 2>&1
          status=$?
          printf '%s\n' "$status" > repair-diagnostic/status.txt
          cat repair-diagnostic/repair.log
          exit "$status"
      - name: Upload repair diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workspace-repair-diagnostic
          path: repair-diagnostic
          if-no-files-found: error
      - name: Fail when repair did not complete
        if: steps.repair.outcome == 'failure'
        run: exit 1
