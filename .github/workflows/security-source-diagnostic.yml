name: Security source diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  collect-security-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: security-sources
          path: |
            src/CarbonFootprint.Web/Security
            src/CarbonFootprint.Web/Program.cs
            src/CarbonFootprint.Infrastructure
          if-no-files-found: error
