name: Workspace source snapshot

on:
  push:
    branches:
      - agent/fix-workspace-selects-e2e

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: workspace-source-snapshot
          path: |
            src/CarbonFootprint.Web/Pages/Workspace.cshtml
            src/CarbonFootprint.Web/Pages/Workspace.cshtml.cs
            src/CarbonFootprint.Web/Pages/Shared/_Layout.cshtml
            src/CarbonFootprint.Web/wwwroot/css/site.css
            src/CarbonFootprint.Web/wwwroot/js/site.js
            tests/E2E/auth-flow.mjs
            .github/workflows/pull-request.yml
          if-no-files-found: error
