    [Fact]
    public void TryNormalizeSha256_accepts_uppercase_and_normalizes_to_lowercase()
    {
        var input = new string('A', 64);

        var valid = SourceDocumentIntegrity.TryNormalizeSha256(input, out var normalized);

        Assert.True(valid);
        Assert.Equal(new string('a', 64), normalized);
    }

    [Theory]
    [InlineData("")]
    [InlineData("abc")]
    [InlineData("gggggggggggggggggggggggggggggggggggggggggggggggggggggggggggggggg")]
    public void TryNormalizeSha256_rejects_non_sha256_values(string input)
    {
        Assert.False(SourceDocumentIntegrity.TryNormalizeSha256(input, out var normalized));
        Assert.Equal(string.Empty, normalized);
    }
}
''')

