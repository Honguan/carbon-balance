name: Temporary source integrity implementation

on:
  push:
    branches: [agent/source-integrity-controlled-inputs]

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
