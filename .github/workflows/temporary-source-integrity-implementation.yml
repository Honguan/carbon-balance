## 1. 文件依據與決策

雲端專題報告與研究論文用於確認五階段、活動數據、全場能資源分配、廢棄物、運輸與使用情境等歷史需求；現行標準、PCR 與主管機關要求仍優先於歷史論文。

原始文件 SHA-256 是必要的完整性欄位，適用於：

- PCR 原始 PDF。
- 排放係數原始資料集、文獻、檢測報告或供應商文件。
- 活動數據上傳的佐證檔案。
- 匯入批次與不可變計算輸入 manifest。

SHA-256 必須由原始檔案位元組計算，保存為 64 位小寫十六進位字串。網址、檔名或畫面內容不可取代原始檔 checksum。

## 2. 活動數據必要欄位

每筆活動至少保存：

- 生命週期階段與活動類型。
- 活動項目；優先由受控選單選擇，其他項目可自訂。
- 原始值、原始單位、標準值、標準單位與換算版本。
- 資料期間。
- 資料來源類型、資料提供者、取得方式與來源參照。
- 排放係數版本。
- 分配比例。
- 一級／二級／估算資料品質。
- 估算或替代資料理由。
- 佐證文件名稱、物件位置、掃描狀態及 SHA-256。

## 3. 製造設備簡化原則

設備不是每筆碳足跡活動的必填主體。製造階段先記錄能資源消耗、廢棄物或委外運輸；設備僅以選填類別輔助分配與追溯：生產機台、空壓機、鍋爐、冰水主機、空調、泵浦／馬達、照明或其他。

品牌、型號、額定功率、效率與維護資料不設為通用強制欄位。只有適用 PCR、分配方法或佐證文件確實需要時，才在情境說明或後續設備子模組保存。

## 4. 選單與「其他」規則

- 有穩定分類的欄位使用 select。
- 每個受控 select 提供「其他（自行輸入）」。
- 選擇其他時才顯示且要求自訂欄位。
- 後端不信任前端 hidden／required 狀態，會重新驗證選單與其他值。
- 原始文件 SHA-256 不提供「略過」選項。
''')
