name: Temporary source integrity implementation

on:
  push:
    branches: [agent/source-integrity-controlled-inputs]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  implement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/source-integrity-controlled-inputs
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Transform persistence model
        run: python .github/temporary-source-integrity/01-model.py
      - name: Transform PCR and factor handlers
        run: python .github/temporary-source-integrity/02-handlers.py
      - name: Transform activity handler
        run: python .github/temporary-source-integrity/03-activity-handler.py
      - name: Transform factor form
        run: python .github/temporary-source-integrity/04-factor-form.py
      - name: Transform activity form
        run: python .github/temporary-source-integrity/05-activity-form.py
      - name: Transform client tests and docs
        run: python .github/temporary-source-integrity/06-client-tests-docs.py
      - name: Generate migration and validate
        run: |
          set -euo pipefail
          dotnet tool restore
          dotnet restore --locked-mode
          dotnet ef migrations add AddFactorSourceDocumentIntegrity --project src/CarbonFootprint.Infrastructure --startup-project src/CarbonFootprint.Web --context CarbonFootprintDbContext --output-dir Persistence/Migrations
          dotnet format --no-restore
          dotnet build --configuration Release --no-restore
          dotnet test tests/Unit --configuration Release --no-build
          git diff --check
      - name: Commit generated implementation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests docs
          git commit -m 'feat: require source integrity and simplify controlled inputs'
          git push origin HEAD:agent/source-integrity-controlled-inputs
