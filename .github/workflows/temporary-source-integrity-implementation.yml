          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path_text, old, new):
              path = Path(path_text)
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'Replacement target not found in {path}: {old[:120]!r}')
              path.write_text(text.replace(old, new, 1))

          records = Path('src/CarbonFootprint.Infrastructure/Persistence/Records.cs')
          text = records.read_text()
          old = '''    public string SourceName { get; set; } = string.Empty;
    public string DatasetName { get; set; } = string.Empty;
    public string Applicability { get; set; } = string.Empty;
'''
