name: carbon-footprint

services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carbon_footprint}
      POSTGRES_USER: ${POSTGRES_USER:-carbon_app}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required; run the local setup script or create .env}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-carbon_minio}
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required; run the local setup script or create .env}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.30
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit-data:/data

  clamav:
    image: clamav/clamav:1.5-debian13-slim@sha256:a73435b0fa51886e9e6dd1881656023ba9dce756e055f23981270badbb8ca3d7
    volumes:
      - clamav-data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  migrate:
    image: carbon-footprint-app:local
    build:
      context: .
      dockerfile: src/CarbonFootprint.Web/Dockerfile
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-carbon_footprint};Username=${POSTGRES_USER:-carbon_app};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required; run the local setup script or create .env}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: carbon-footprint-app:local
    build:
      context: .
      dockerfile: src/CarbonFootprint.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-carbon_footprint};Username=${POSTGRES_USER:-carbon_app};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required; run the local setup script or create .env}"
      OBJECTSTORAGE__ENDPOINT: http://minio:9000
      OBJECTSTORAGE__BUCKET: ${OBJECTSTORAGE__BUCKET:-carbon-evidence}
      OBJECTSTORAGE__ACCESSKEY: ${MINIO_ROOT_USER:-carbon_minio}
      OBJECTSTORAGE__SECRETKEY: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required; run the local setup script or create .env}"
      MALWARESCANNER__HOST: clamav
      MALWARESCANNER__PORT: 3310
      MAIL__HOST: mailpit
      MAIL__PORT: 1025
    ports:
      - "8088:8080"
    volumes:
      - data-protection-keys:/keys
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
  mailpit-data:
  data-protection-keys:
  clamav-data:
