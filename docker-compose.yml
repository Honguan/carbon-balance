name: carbon-footprint

services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carbon_footprint}
      POSTGRES_USER: ${POSTGRES_USER:-carbon_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-local-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-carbon_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-this-local-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.30
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit-data:/data

  migrate:
    build:
      context: .
      dockerfile: src/CarbonFootprint.Web/Dockerfile
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-carbon_footprint};Username=${POSTGRES_USER:-carbon_app};Password=${POSTGRES_PASSWORD:-change-this-local-password}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: src/CarbonFootprint.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-carbon_footprint};Username=${POSTGRES_USER:-carbon_app};Password=${POSTGRES_PASSWORD:-change-this-local-password}
      OBJECTSTORAGE__ENDPOINT: http://minio:9000
      OBJECTSTORAGE__BUCKET: ${OBJECTSTORAGE__BUCKET:-carbon-evidence}
      MAIL__HOST: mailpit
      MAIL__PORT: 1025
    ports:
      - "8088:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
  mailpit-data:
